<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{APP_NAME}} — {{SUBTITLE}}</title>
  <meta name="description" content="{{META_DESCRIPTION}}">
  <meta property="og:title" content="{{APP_NAME}} — {{SUBTITLE}}">
  <meta property="og:description" content="{{META_DESCRIPTION}}">
  <meta property="og:type" content="website">
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --text: #f0f4f8;
      --muted: #94a3b8;
      --accent: {{ACCENT_COLOR}};
      --accent-soft: {{ACCENT_SOFT}};
      --safe: #34d399;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }
    .wrap { max-width: 640px; margin: 0 auto; padding: 2rem 1.25rem 3rem; }
    .badge {
      display: inline-block;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      margin-bottom: 1rem;
    }
    h1 { font-size: 2.25rem; font-weight: 700; line-height: 1.2; margin-bottom: 0.5rem; }
    .subtitle { font-size: 1.125rem; color: var(--muted); margin-bottom: 1.5rem; }
    .price { font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; }
    .price strong { color: var(--text); }
    .stores { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 2.5rem; }
    .store-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 1rem 1.25rem;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.15s, opacity 0.15s;
    }
    .store-btn:hover { transform: translateY(-1px); opacity: 0.95; }
    .store-btn.primary {
      background: var(--accent);
      color: #fff;
    }
    .store-btn.secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid #334155;
    }
    .features { list-style: none; margin-bottom: 2rem; }
    .features li {
      padding: 0.65rem 0;
      padding-left: 1.5rem;
      position: relative;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .features li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 1rem;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--safe);
    }
    .features li strong { color: var(--text); }
    footer {
      font-size: 0.8rem;
      color: var(--muted);
      border-top: 1px solid #1e293b;
      padding-top: 1.5rem;
    }
    footer a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <span class="badge">{{BADGE_TEXT}}</span>
    <h1>{{APP_NAME}}</h1>
    <p class="subtitle">{{SUBTITLE}}</p>
    <p class="price">{{PRICE_LINE}}</p>

    <div class="stores">
      {{STORE_BUTTONS}}
    </div>

    <ul class="features">
      {{FEATURES_HTML}}
    </ul>

    <footer>
      <p>{{FOOTER_LINE}}</p>
      <p style="margin-top:0.5rem">
        <a href="{{PRIVACY_URL}}">Privacy</a>
        · <a href="mailto:{{SUPPORT_EMAIL}}">Support</a>
      </p>
    </footer>
  </div>
</body>
</html>
