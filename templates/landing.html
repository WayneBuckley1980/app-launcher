<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{APP_NAME}} — {{SUBTITLE}}</title>
  <meta name="description" content="{{META_DESCRIPTION}}">
  <meta property="og:title" content="{{APP_NAME}} — {{SUBTITLE}}">
  <meta property="og:description" content="{{META_DESCRIPTION}}">
  <meta property="og:type" content="website">
  {{OG_IMAGE}}
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="{{ACCENT_COLOR}}">
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --text: #f0f4f8;
      --muted: #94a3b8;
      --accent: {{ACCENT_COLOR}};
      --accent-soft: {{ACCENT_SOFT}};
      --safe: #34d399;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }
    .wrap { max-width: 720px; margin: 0 auto; padding: 2rem 1.25rem 3rem; }
    .hero {
      display: flex;
      gap: 1.25rem;
      align-items: flex-start;
      margin-bottom: 1.5rem;
    }
    .app-icon {
      width: 88px;
      height: 88px;
      border-radius: 20px;
      flex-shrink: 0;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      object-fit: cover;
      background: var(--surface);
    }
    .hero-text { flex: 1; min-width: 0; }
    .badge {
      display: inline-block;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      margin-bottom: 0.75rem;
    }
    h1 { font-size: 2rem; font-weight: 700; line-height: 1.2; margin-bottom: 0.4rem; }
    .subtitle { font-size: 1.05rem; color: var(--muted); margin-bottom: 0.75rem; }
    .price { font-size: 0.95rem; color: var(--muted); margin-bottom: 1.5rem; }
    .price strong { color: var(--text); }
    .stores { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 2rem; }
    .store-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem 1.25rem;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.15s, opacity 0.15s;
    }
    .store-btn:hover { transform: translateY(-1px); opacity: 0.95; }
    .store-btn.primary { background: var(--accent); color: #fff; }
    .store-btn.secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid #334155;
    }
    .screenshots-section { margin-bottom: 2rem; }
    .screenshots-section h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }
    .screenshots {
      display: flex;
      gap: 0.75rem;
      overflow-x: auto;
      padding-bottom: 0.5rem;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .screenshots::-webkit-scrollbar { height: 6px; }
    .screenshots::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    .shot {
      flex: 0 0 auto;
      scroll-snap-align: start;
      width: 200px;
    }
    .shot img {
      width: 200px;
      height: auto;
      border-radius: 16px;
      border: 1px solid #334155;
      display: block;
      background: var(--surface);
    }
    .shot figcaption {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.4rem;
      line-height: 1.3;
    }
    .features { list-style: none; margin-bottom: 2rem; }
    .features li {
      padding: 0.65rem 0;
      padding-left: 1.5rem;
      position: relative;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .features li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 1rem;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--safe);
    }
    footer {
      font-size: 0.8rem;
      color: var(--muted);
      border-top: 1px solid #1e293b;
      padding-top: 1.5rem;
    }
    footer a { color: var(--accent); }
    @media (max-width: 480px) {
      .hero { flex-direction: column; align-items: center; text-align: center; }
      h1 { font-size: 1.75rem; }
      .shot, .shot img { width: 180px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      {{APP_ICON}}
      <div class="hero-text">
        <span class="badge">{{BADGE_TEXT}}</span>
        <h1>{{APP_NAME}}</h1>
        <p class="subtitle">{{SUBTITLE}}</p>
      </div>
    </div>

    <p class="price">{{PRICE_LINE}}</p>

    <div class="stores">{{STORE_BUTTONS}}</div>

    {{SCREENSHOTS_SECTION}}

    <ul class="features">{{FEATURES_HTML}}</ul>

    <footer>
      <p>{{FOOTER_LINE}}</p>
      <p style="margin-top:0.5rem">
        <a href="{{PRIVACY_URL}}">Privacy</a>
        · <a href="mailto:{{SUPPORT_EMAIL}}">Support</a>
      </p>
    </footer>
  </div>
</body>
</html>
